<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Neon Drift</title>
    <style>
        :root {
            --bg0: #070911;
            --bg1: #0b1030;
            --neon: #56f2ff;
            --neon2: #ff4fd8;
            --text: #dbe8ff;
            --muted: #91a0c6;
            --panel: rgba(12, 16, 40, .72);
            --border: rgba(86, 242, 255, .20);
            --shadow: rgba(0, 0, 0, .55);
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: radial-gradient(1200px 800px at 50% 30%, var(--bg1), var(--bg0));
            color: var(--text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        .hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            gap: 12px;
        }

        .topRow {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .pill {
            pointer-events: none;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px var(--shadow);
            border-radius: 14px;
            padding: 10px 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-width: 150px;
        }

        .pill .label {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase
        }

        .pill .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 2px
        }

        .center {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(520px, calc(100vw - 32px));
            pointer-events: auto;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px var(--shadow);
            border-radius: 18px;
            padding: 18px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 6px 0;
        }

        .badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--neon));
            box-shadow: 0 0 20px rgba(86, 242, 255, .65);
        }

        h1 {
            font-size: 22px;
            margin: 0;
        }

        .desc {
            margin: 10px 0 12px 0;
            color: var(--muted);
            line-height: 1.35
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between
        }

        .btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        button {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, .12);
            background: linear-gradient(180deg, rgba(86, 242, 255, .18), rgba(86, 242, 255, .06));
            color: var(--text);
            padding: 10px 12px;
            border-radius: 12px;
            font-weight: 650;
            letter-spacing: .01em;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .35);
            transition: transform .06s ease, filter .12s ease, border-color .12s ease;
            user-select: none;
        }

        button:hover {
            filter: brightness(1.06);
            border-color: rgba(86, 242, 255, .35)
        }

        button:active {
            transform: translateY(1px) scale(.99)
        }

        .secondary {
            background: linear-gradient(180deg, rgba(255, 79, 216, .16), rgba(255, 79, 216, .05));
            border-color: rgba(255, 79, 216, .22);
        }

        .kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            padding: 2px 7px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .06);
            font-weight: 700;
            font-size: 12px;
            color: var(--text);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
        }

        .footerTip {
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hide {
            display: none
        }

        a {
            color: var(--neon);
            text-decoration: none
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <div class="hud">
        <div class="topRow">
            <div class="pill">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="pill">
                <div class="label">Best</div>
                <div class="value" id="best">0</div>
            </div>
        </div>
    </div>

    <div class="center" id="overlay">
        <div class="card">
            <div class="title">
                <div class="badge"></div>
                <h1 id="ovTitle">Neon Drift</h1>
            </div>
            <div class="desc" id="ovDesc">
                Dodge the incoming asteroids. Survive as long as you can.
                <br><br>
                Desktop controls: <span class="kbd">W</span><span style="display:inline-block;width:6px"></span><span
                    class="kbd">A</span><span style="display:inline-block;width:6px"></span><span
                    class="kbd">S</span><span style="display:inline-block;width:6px"></span><span class="kbd">D</span>
                or arrow keys.
                <br>
                Mobile controls: drag anywhere to steer.
            </div>
            <div class="row">
                <div class="btns">
                    <button id="playBtn">Play</button>
                    <button class="secondary" id="shareBtn">Copy Share Text</button>
                </div>
                <div class="footerTip">
                    <span id="smallTip">Press <span class="kbd">Space</span> to restart after game over.</span>
                    <span>Made in one file</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d', { alpha: false });

            const scoreEl = document.getElementById('score');
            const bestEl = document.getElementById('best');
            const overlay = document.getElementById('overlay');
            const ovTitle = document.getElementById('ovTitle');
            const ovDesc = document.getElementById('ovDesc');
            const playBtn = document.getElementById('playBtn');
            const shareBtn = document.getElementById('shareBtn');

            const DPR = () => Math.min(2, window.devicePixelRatio || 1);

            let W = 0, H = 0, dpr = 1;
            function resize() {
                dpr = DPR();
                W = Math.floor(innerWidth);
                H = Math.floor(innerHeight);
                canvas.width = Math.floor(W * dpr);
                canvas.height = Math.floor(H * dpr);
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            addEventListener('resize', resize, { passive: true });
            resize();

            const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
            const rand = (a, b) => a + Math.random() * (b - a);
            const lerp = (a, b, t) => a + (b - a) * t;

            const storageKey = 'neon_drift_best_v1';
            let best = Number(localStorage.getItem(storageKey) || 0);
            bestEl.textContent = best.toString();

            let running = false;
            let gameOver = false;

            const state = {
                t: 0,
                score: 0,
                difficulty: 0,
                shake: 0,
                stars: [],
                asteroids: [],
                particles: [],
                lastSpawn: 0,
                pointer: { active: false, x: W * 0.5, y: H * 0.7 },
                player: {
                    x: W * 0.5,
                    y: H * 0.7,
                    vx: 0,
                    vy: 0,
                    r: 14,
                    hp: 1,
                    inv: 0
                }
            };

            function reset() {
                state.t = 0;
                state.score = 0;
                state.difficulty = 0;
                state.shake = 0;
                state.asteroids.length = 0;
                state.particles.length = 0;
                state.player.x = W * 0.5;
                state.player.y = H * 0.72;
                state.player.vx = 0;
                state.player.vy = 0;
                state.player.inv = 0;
                scoreEl.textContent = '0';
                gameOver = false;
                initStars();
            }

            function initStars() {
                state.stars.length = 0;
                const n = Math.floor((W * H) / 18000);
                for (let i = 0; i < n; i++) {
                    state.stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        z: rand(0.2, 1.0),
                        tw: rand(0, Math.PI * 2)
                    });
                }
            }

            function spawnAsteroid() {
                const edge = Math.floor(Math.random() * 4);
                let x, y, vx, vy;
                const speed = rand(140, 260) + state.difficulty * 65;
                const angleToCenter = (x0, y0) => Math.atan2(H * 0.5 - y0, W * 0.5 - x0);

                if (edge === 0) { x = rand(0, W); y = -30; }
                if (edge === 1) { x = W + 30; y = rand(0, H); }
                if (edge === 2) { x = rand(0, W); y = H + 30; }
                if (edge === 3) { x = -30; y = rand(0, H); }

                const ang = angleToCenter(x, y) + rand(-0.55, 0.55);
                vx = Math.cos(ang) * speed;
                vy = Math.sin(ang) * speed;

                const r = rand(16, 42);
                const spin = rand(-2.2, 2.2);

                const jag = [];
                const verts = Math.floor(rand(7, 12));
                for (let i = 0; i < verts; i++) {
                    jag.push(rand(0.75, 1.25));
                }

                state.asteroids.push({
                    x, y, vx, vy, r,
                    a: rand(0, Math.PI * 2),
                    spin,
                    jag
                });
            }

            function burst(x, y, base, spread, count, life, spdMin, spdMax) {
                for (let i = 0; i < count; i++) {
                    const a = base + rand(-spread, spread);
                    const sp = rand(spdMin, spdMax);
                    state.particles.push({
                        x, y,
                        vx: Math.cos(a) * sp,
                        vy: Math.sin(a) * sp,
                        r: rand(1.2, 2.8),
                        life,
                        ttl: life,
                        hue: Math.random() < 0.5 ? 185 : 310
                    });
                }
            }

            function setOverlay(mode) {
                if (mode === 'start') {
                    ovTitle.textContent = 'Neon Drift';
                    ovDesc.innerHTML =
                        'Dodge the incoming asteroids. Survive as long as you can.' +
                        '<br><br>' +
                        'Desktop controls: <span class="kbd">W</span> <span class="kbd">A</span> <span class="kbd">S</span> <span class="kbd">D</span> or arrow keys.' +
                        '<br>' +
                        'Mobile controls: drag anywhere to steer.';
                    playBtn.textContent = 'Play';
                    overlay.classList.remove('hide');
                    return;
                }
                if (mode === 'over') {
                    ovTitle.textContent = 'Game Over';
                    ovDesc.innerHTML =
                        'Score: <b>' + Math.floor(state.score) + '</b>' +
                        '<br>Best: <b>' + best + '</b>' +
                        '<br><br>Press <span class="kbd">Space</span> or tap Play to try again.';
                    playBtn.textContent = 'Play Again';
                    overlay.classList.remove('hide');
                    return;
                }
                overlay.classList.add('hide');
            }

            function start() {
                reset();
                running = true;
                setOverlay('hide');
            }

            function end() {
                running = false;
                gameOver = true;
                if (Math.floor(state.score) > best) {
                    best = Math.floor(state.score);
                    localStorage.setItem(storageKey, String(best));
                    bestEl.textContent = String(best);
                }
                setOverlay('over');
            }

            playBtn.addEventListener('click', () => start());

            shareBtn.addEventListener('click', async () => {
                const url = location.href;
                const txt = `Play Neon Drift: ${url}`;
                try {
                    await navigator.clipboard.writeText(txt);
                    shareBtn.textContent = 'Copied';
                    setTimeout(() => shareBtn.textContent = 'Copy Share Text', 900);
                } catch {
                    prompt('Copy this text:', txt);
                }
            });

            const keys = new Set();
            addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D', ' '].includes(e.key)) e.preventDefault();
                keys.add(e.key);
                if (e.key === ' ' && gameOver) start();
                if (e.key === 'Enter' && !running) start();
            }, { passive: false });
            addEventListener('keyup', (e) => keys.delete(e.key), { passive: true });

            function pointerPos(e) {
                const t = (e.touches && e.touches[0]) ? e.touches[0] : e;
                return { x: t.clientX, y: t.clientY };
            }

            canvas.addEventListener('pointerdown', (e) => {
                canvas.setPointerCapture(e.pointerId);
                state.pointer.active = true;
                const p = pointerPos(e);
                state.pointer.x = p.x; state.pointer.y = p.y;
                if (!running) start();
            }, { passive: true });

            canvas.addEventListener('pointermove', (e) => {
                if (!state.pointer.active) return;
                const p = pointerPos(e);
                state.pointer.x = p.x; state.pointer.y = p.y;
            }, { passive: true });

            canvas.addEventListener('pointerup', () => state.pointer.active = false, { passive: true });
            canvas.addEventListener('pointercancel', () => state.pointer.active = false, { passive: true });

            function circleHit(ax, ay, ar, bx, by, br) {
                const dx = ax - bx, dy = ay - by;
                const rr = ar + br;
                return dx * dx + dy * dy <= rr * rr;
            }

            function drawAsteroid(a) {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.a);

                ctx.beginPath();
                const n = a.jag.length;
                for (let i = 0; i < n; i++) {
                    const t = (i / n) * Math.PI * 2;
                    const rr = a.r * a.jag[i];
                    const px = Math.cos(t) * rr;
                    const py = Math.sin(t) * rr;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(-a.r * 0.2, -a.r * 0.2, a.r * 0.2, 0, 0, a.r * 1.25);
                grad.addColorStop(0, 'rgba(255,255,255,0.18)');
                grad.addColorStop(0.35, 'rgba(86,242,255,0.10)');
                grad.addColorStop(1, 'rgba(255,255,255,0.03)');

                ctx.fillStyle = grad;
                ctx.fill();

                ctx.lineWidth = 1.25;
                ctx.strokeStyle = 'rgba(86,242,255,0.18)';
                ctx.stroke();

                ctx.restore();
            }

            function drawPlayer(p) {
                ctx.save();
                ctx.translate(p.x, p.y);
                const ang = Math.atan2(p.vy, p.vx);
                const hasVel = (p.vx * p.vx + p.vy * p.vy) > 20;
                ctx.rotate(hasVel ? ang : -Math.PI / 2);

                const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, 26);
                glow.addColorStop(0, 'rgba(86,242,255,0.55)');
                glow.addColorStop(1, 'rgba(86,242,255,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(0, 0, 26, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(18, 0);
                ctx.lineTo(-14, -10);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-14, 10);
                ctx.closePath();

                const body = ctx.createLinearGradient(-14, -10, 18, 10);
                body.addColorStop(0, 'rgba(255,79,216,0.18)');
                body.addColorStop(0.55, 'rgba(86,242,255,0.22)');
                body.addColorStop(1, 'rgba(255,255,255,0.06)');

                ctx.fillStyle = body;
                ctx.fill();

                ctx.lineWidth = 1.2;
                ctx.strokeStyle = 'rgba(86,242,255,0.35)';
                ctx.stroke();

                ctx.globalAlpha = 0.9;
                ctx.beginPath();
                ctx.arc(-6, 0, 2.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.fill();

                ctx.restore();
            }

            function drawParticles() {
                for (const pt of state.particles) {
                    const t = pt.ttl / pt.life;
                    ctx.globalAlpha = clamp(t, 0, 1);
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${pt.hue}, 95%, 65%, 1)`;
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            function drawStars(dt) {
                for (const s of state.stars) {
                    s.tw += dt * (0.8 + s.z);
                    s.y += dt * (20 + 80 * s.z);
                    if (s.y > H + 10) { s.y = -10; s.x = Math.random() * W; }
                    const a = 0.20 + 0.20 * Math.sin(s.tw);
                    ctx.globalAlpha = a;
                    ctx.fillStyle = 'rgba(219,232,255,1)';
                    ctx.fillRect(s.x, s.y, 1 + s.z, 1 + s.z);
                }
                ctx.globalAlpha = 1;
            }

            let last = performance.now();
            function frame(now) {
                const dt = Math.min(0.033, (now - last) / 1000);
                last = now;

                const bg = ctx.createLinearGradient(0, 0, 0, H);
                bg.addColorStop(0, '#070911');
                bg.addColorStop(1, '#050716');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, W, H);

                drawStars(dt);

                if (running) {
                    state.t += dt;
                    state.score += dt * 10;
                    state.difficulty = Math.min(4, state.t / 22);

                    scoreEl.textContent = String(Math.floor(state.score));

                    const spawnInterval = lerp(0.95, 0.42, state.difficulty / 4);
                    state.lastSpawn += dt;
                    if (state.lastSpawn >= spawnInterval) {
                        state.lastSpawn = 0;
                        spawnAsteroid();
                        if (Math.random() < 0.22 + state.difficulty * 0.06) spawnAsteroid();
                    }

                    const p = state.player;
                    const accel = 980;
                    let ax = 0, ay = 0;

                    const up = keys.has('ArrowUp') || keys.has('w') || keys.has('W');
                    const down = keys.has('ArrowDown') || keys.has('s') || keys.has('S');
                    const left = keys.has('ArrowLeft') || keys.has('a') || keys.has('A');
                    const right = keys.has('ArrowRight') || keys.has('d') || keys.has('D');

                    if (up) ay -= 1;
                    if (down) ay += 1;
                    if (left) ax -= 1;
                    if (right) ax += 1;

                    if (state.pointer.active) {
                        const dx = state.pointer.x - p.x;
                        const dy = state.pointer.y - p.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist > 2) {
                            ax += dx / dist;
                            ay += dy / dist;
                        }
                    }

                    const mag = Math.hypot(ax, ay);
                    if (mag > 0) {
                        ax /= mag; ay /= mag;
                    }

                    p.vx += ax * accel * dt;
                    p.vy += ay * accel * dt;

                    const damp = 0.86;
                    p.vx *= Math.pow(damp, dt * 60);
                    p.vy *= Math.pow(damp, dt * 60);

                    p.x += p.vx * dt;
                    p.y += p.vy * dt;

                    const pad = 24;
                    if (p.x < pad) { p.x = pad; p.vx *= -0.25; }
                    if (p.x > W - pad) { p.x = W - pad; p.vx *= -0.25; }
                    if (p.y < pad) { p.y = pad; p.vy *= -0.25; }
                    if (p.y > H - pad) { p.y = H - pad; p.vy *= -0.25; }

                    const sp = Math.hypot(p.vx, p.vy);
                    if (sp > 40 && Math.random() < 0.55) {
                        const tailAng = Math.atan2(p.vy, p.vx) + Math.PI;
                        burst(p.x - Math.cos(tailAng) * 10, p.y - Math.sin(tailAng) * 10, tailAng, 0.45, 1, 0.45, 40, 140);
                    }

                    for (const a of state.asteroids) {
                        a.x += a.vx * dt;
                        a.y += a.vy * dt;
                        a.a += a.spin * dt;
                    }

                    for (let i = state.asteroids.length - 1; i >= 0; i--) {
                        const a = state.asteroids[i];
                        if (a.x < -140 || a.x > W + 140 || a.y < -140 || a.y > H + 140) {
                            state.asteroids.splice(i, 1);
                        }
                    }

                    for (const pt of state.particles) {
                        pt.x += pt.vx * dt;
                        pt.y += pt.vy * dt;
                        pt.vx *= Math.pow(0.90, dt * 60);
                        pt.vy *= Math.pow(0.90, dt * 60);
                        pt.ttl -= dt;
                    }
                    for (let i = state.particles.length - 1; i >= 0; i--) {
                        if (state.particles[i].ttl <= 0) state.particles.splice(i, 1);
                    }

                    for (const a of state.asteroids) {
                        const hit = circleHit(p.x, p.y, p.r * 0.9, a.x, a.y, a.r * 0.82);
                        if (hit) {
                            const ang = Math.atan2(p.y - a.y, p.x - a.x);
                            burst(p.x, p.y, ang, Math.PI, 90, 0.65, 80, 420);
                            state.shake = 10;
                            end();
                            break;
                        }
                    }
                }

                if (state.shake > 0) {
                    state.shake = Math.max(0, state.shake - dt * 22);
                }

                const sx = (Math.random() - 0.5) * state.shake;
                const sy = (Math.random() - 0.5) * state.shake;
                ctx.save();
                ctx.translate(sx, sy);

                for (const a of state.asteroids) drawAsteroid(a);
                drawParticles();
                drawPlayer(state.player);

                ctx.restore();

                const vign = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.2, W / 2, H / 2, Math.max(W, H) * 0.75);
                vign.addColorStop(0, 'rgba(0,0,0,0)');
                vign.addColorStop(1, 'rgba(0,0,0,0.55)');
                ctx.fillStyle = vign;
                ctx.fillRect(0, 0, W, H);

                requestAnimationFrame(frame);
            }

            setOverlay('start');
            requestAnimationFrame(frame);
        })();
    </script>
</body>

</html>
