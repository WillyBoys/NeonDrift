<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Neon Drift</title>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        :root {
            --bg0: #070911;
            --bg1: #0b1030;
            --neon: #56f2ff;
            --neon2: #ff4fd8;
            --text: #dbe8ff;
            --muted: #91a0c6;
            --panel: rgba(12, 16, 40, .72);
            --border: rgba(86, 242, 255, .20);
            --shadow: rgba(0, 0, 0, .55);
            --danger: rgba(255, 60, 90, .22);
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: radial-gradient(1200px 800px at 50% 30%, var(--bg1), var(--bg0));
            color: var(--text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        .hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            gap: 12px;
        }

        .topRow {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pill {
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px var(--shadow);
            border-radius: 14px;
            padding: 10px 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-width: 150px;
        }

        .pill .label {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase
        }

        .pill .value {
            font-size: 22px;
            font-weight: 800;
            margin-top: 2px
        }

        .pill.small {
            min-width: 190px
        }

        .rowInline {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap
        }

        .barWrap {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .bar {
            width: 160px;
            height: 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .06);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
        }

        .bar>div {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(86, 242, 255, .85), rgba(255, 79, 216, .75));
        }

        .badgePill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
            color: var(--text);
            font-size: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--neon));
            box-shadow: 0 0 18px rgba(86, 242, 255, .55);
        }

        .dangerDot {
            background: radial-gradient(circle at 30% 30%, #fff, #ff3c5a);
            box-shadow: 0 0 18px rgba(255, 60, 90, .55);
        }

        .center {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(620px, calc(100vw - 32px));
            pointer-events: auto;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px var(--shadow);
            border-radius: 18px;
            padding: 18px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 6px 0;
        }

        .badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--neon));
            box-shadow: 0 0 20px rgba(86, 242, 255, .65);
        }

        h1 {
            font-size: 22px;
            margin: 0;
        }

        .desc {
            margin: 10px 0 12px 0;
            color: var(--muted);
            line-height: 1.35
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between
        }

        .btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        button {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, .12);
            background: linear-gradient(180deg, rgba(86, 242, 255, .18), rgba(86, 242, 255, .06));
            color: var(--text);
            padding: 10px 12px;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: .01em;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .35);
            transition: transform .06s ease, filter .12s ease, border-color .12s ease;
            user-select: none;
        }

        button:hover {
            filter: brightness(1.06);
            border-color: rgba(86, 242, 255, .35)
        }

        button:active {
            transform: translateY(1px) scale(.99)
        }

        button:disabled {
            opacity: .55;
            cursor: not-allowed;
            filter: saturate(.6);
            transform: none;
        }

        .secondary {
            background: linear-gradient(180deg, rgba(255, 79, 216, .16), rgba(255, 79, 216, .05));
            border-color: rgba(255, 79, 216, .22);
        }

        .kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            padding: 2px 7px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .06);
            font-weight: 800;
            font-size: 12px;
            color: var(--text);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
        }

        .footerTip {
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .gridStats {
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat {
            border: 1px solid rgba(255, 255, 255, .10);
            background: rgba(255, 255, 255, .05);
            border-radius: 14px;
            padding: 10px 12px;
        }

        .stat .k {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase
        }

        .stat .v {
            font-size: 18px;
            font-weight: 800;
            margin-top: 2px
        }

        .cosmeticsWrap {
            margin-top: 14px;
            border: 1px solid rgba(255, 255, 255, .10);
            background: rgba(255, 255, 255, .04);
            border-radius: 16px;
            padding: 12px;
        }

        .cosmeticsTitle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .cosmeticsTitle .t {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .cosmeticsGrid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        @media (min-width: 520px) {
            .cosmeticsGrid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        .cosmeticItem {
            position: relative;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(0, 0, 0, .16);
            padding: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: transform .06s ease, filter .12s ease, border-color .12s ease;
            user-select: none;
        }

        .cosmeticItem:hover {
            filter: brightness(1.05)
        }

        .cosmeticItem:active {
            transform: translateY(1px) scale(.99)
        }

        .cosmeticItem.selected {
            border-color: rgba(86, 242, 255, .45);
            box-shadow: 0 0 0 2px rgba(86, 242, 255, .10) inset;
        }

        .cosmeticSwatch {
            height: 26px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: linear-gradient(90deg, rgba(86, 242, 255, .35), rgba(255, 79, 216, .28));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
        }

        .cosmeticName {
            margin-top: 8px;
            font-weight: 800;
            font-size: 13px;
        }

        .cosmeticReq {
            margin-top: 3px;
            font-size: 12px;
            color: var(--muted);
        }

        .lockedOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(219, 232, 255, .92);
            font-size: 12px;
            gap: 8px;
        }

        .lockIcon {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .06);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hide {
            display: none
        }

        .sideBoard {
            position: fixed;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: min(320px, calc(100vw - 32px));
            max-height: 72vh;
            overflow: auto;
            pointer-events: auto;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px var(--shadow);
            border-radius: 18px;
            padding: 12px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .sideHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .sideHeader .t {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            font-weight: 900;
        }

        .lbMiniRow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .10);
            background: rgba(255, 255, 255, .05);
        }

        .lbMiniLeft {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .lbMiniRank {
            color: var(--muted);
            font-weight: 900;
            min-width: 28px;
        }

        .lbMiniName {
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .lbMiniScore {
            font-weight: 900;
        }

        .lbControls {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .lbControls input {
            flex: 1;
            min-width: 160px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(0, 0, 0, .20);
            color: var(--text);
            outline: none;
        }

        .lbMsg {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 10px;
            min-height: 16px;
        }

        .lbList {
            display: grid;
            gap: 8px;
        }

        @media (max-width: 900px) {
            .sideBoard {
                top: auto;
                bottom: 16px;
                transform: none;
                max-height: 44vh;
            }
        }

        /* Clean game over layout and avoid overlap */
        .hud {
            z-index: 5;
        }

        .sideBoard {
            z-index: 15;
        }

        .center {
            z-index: 20;
        }

        body.mode-over .hud .topRow {
            opacity: 0;
            pointer-events: none;
        }

        body.mode-over .sideBoard {
            left: auto;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: min(320px, calc(100vw - 32px));
            max-height: 72vh;
        }

        body.mode-over .center {
            width: min(640px, calc(100vw - 32px));
        }

        @media (max-width: 900px) {
            body.mode-over .sideBoard {
                left: auto;
                right: 16px;
                top: auto;
                bottom: 16px;
                transform: none;
                width: calc(100vw - 32px);
                max-height: 44vh;
            }
        }

        body.mode-over::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <div class="hud">
        <div class="topRow">
            <div class="pill">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
                <div class="rowInline" style="margin-top:8px">
                    <span class="badgePill"><span class="dot"></span><span id="levelText">Lvl 1</span></span>
                    <span class="badgePill" id="skinPill"><span class="dot" id="skinDot"></span><span
                            id="skinName">Starter</span></span>
                </div>
            </div>

            <div class="pill">
                <div class="label">Best</div>
                <div class="value" id="best">0</div>
                <div class="rowInline" style="margin-top:8px">
                    <span class="badgePill" id="stormPill"><span class="dot" id="stormDot"></span><span
                            id="stormText">Calm</span></span>
                </div>
            </div>

            <div class="pill small">
                <div class="label">Combo</div>
                <div class="value" id="combo">x1</div>
                <div class="barWrap" style="margin-top:8px">
                    <span class="badgePill"><span class="dot"></span><span>Dash</span></span>
                    <div class="bar">
                        <div id="dashBar"></div>
                    </div>
                </div>
                <div style="margin-top:8px;color:var(--muted);font-size:12px">
                    Press <span class="kbd">Space</span> to dash
                </div>
            </div>
        </div>
    </div>

    <div class="sideBoard hide" id="leaderSide">
        <div class="sideHeader">
            <div class="t">Global Top 10</div>
            <button class="secondary" id="lbRefresh" style="padding:8px 10px;border-radius:12px">Refresh</button>
        </div>

        <div class="lbControls" id="lbControls">
            <input id="lbName" placeholder="Name" maxlength="16" />
            <button id="lbSubmit" style="padding:10px 12px;border-radius:12px">Submit</button>
        </div>

        <div id="tsWrap" style="margin:8px 0">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACjA26vnBQ3_hCqw"></div>
        </div>

        <div class="lbMsg" id="lbMsg"></div>
        <div class="lbList" id="lbList"></div>
    </div>

    <div class="center" id="overlay">
        <div class="card">
            <div class="title">
                <div class="badge"></div>
                <h1 id="ovTitle">Neon Drift</h1>
            </div>
            <div class="desc" id="ovDesc"></div>

            <div class="gridStats hide" id="ovStats">
                <div class="stat">
                    <div class="k">Survival</div>
                    <div class="v" id="stSurvive">0s</div>
                </div>
                <div class="stat">
                    <div class="k">Near Misses</div>
                    <div class="v" id="stNear">0</div>
                </div>
                <div class="stat">
                    <div class="k">Top Combo</div>
                    <div class="v" id="stCombo">x1</div>
                </div>
                <div class="stat">
                    <div class="k">Next Unlock</div>
                    <div class="v" id="stNext">None</div>
                </div>
            </div>

            <div class="cosmeticsWrap hide" id="cosmeticsWrap">
                <div class="cosmeticsTitle">
                    <div class="t">Cosmetics</div>
                    <div style="font-size:12px;color:var(--muted)">Click a skin to select</div>
                </div>
                <div class="cosmeticsGrid" id="cosmeticsGrid"></div>
            </div>

            <div class="row" style="margin-top:14px">
                <div class="btns">
                    <button id="playBtn">Play</button>
                    <button class="secondary" id="shareBtn">Copy Share Text</button>
                </div>
                <div class="footerTip">
                    <span id="smallTip">Press <span class="kbd">Space</span> to restart after game over.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d', { alpha: false });

            const scoreEl = document.getElementById('score');
            const bestEl = document.getElementById('best');
            const comboEl = document.getElementById('combo');
            const dashBarEl = document.getElementById('dashBar');
            const levelTextEl = document.getElementById('levelText');

            const skinNameEl = document.getElementById('skinName');
            const skinPillEl = document.getElementById('skinPill');
            const skinDotEl = document.getElementById('skinDot');

            const stormPillEl = document.getElementById('stormPill');
            const stormDotEl = document.getElementById('stormDot');
            const stormTextEl = document.getElementById('stormText');

            const overlay = document.getElementById('overlay');
            const ovTitle = document.getElementById('ovTitle');
            const ovDesc = document.getElementById('ovDesc');
            const playBtn = document.getElementById('playBtn');
            const shareBtn = document.getElementById('shareBtn');
            const smallTip = document.getElementById('smallTip');

            const ovStats = document.getElementById('ovStats');
            const stSurvive = document.getElementById('stSurvive');
            const stNear = document.getElementById('stNear');
            const stCombo = document.getElementById('stCombo');
            const stNext = document.getElementById('stNext');

            const cosmeticsWrap = document.getElementById('cosmeticsWrap');
            const cosmeticsGrid = document.getElementById('cosmeticsGrid');

            const leaderSide = document.getElementById('leaderSide');
            const lbControls = document.getElementById('lbControls');
            const lbNameEl = document.getElementById('lbName');
            const lbSubmitBtn = document.getElementById('lbSubmit');
            const lbRefreshBtn = document.getElementById('lbRefresh');
            const lbMsgEl = document.getElementById('lbMsg');
            const lbListEl = document.getElementById('lbList');

            const LEADERBOARD_BASE = "https://neon-drift-leaderboard.willyboys.workers.dev";
            const LB_NAME_KEY = "neon_drift_lb_name_v3";

            const SUBMITTED_RUNS_KEY = "neon_drift_submitted_run_scores_v1";
            let submittedRunScores = [];
            try {
                submittedRunScores = JSON.parse(localStorage.getItem(SUBMITTED_RUNS_KEY) || "[]");
                if (!Array.isArray(submittedRunScores)) submittedRunScores = [];
            } catch { submittedRunScores = []; }

            const DPR = () => Math.min(2, window.devicePixelRatio || 1);

            let W = 0, H = 0, dpr = 1;
            function resize() {
                dpr = DPR();
                W = Math.floor(innerWidth);
                H = Math.floor(innerHeight);
                canvas.width = Math.floor(W * dpr);
                canvas.height = Math.floor(H * dpr);
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            addEventListener('resize', resize, { passive: true });
            resize();

            const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
            const rand = (a, b) => a + Math.random() * (b - a);
            const lerp = (a, b, t) => a + (b - a) * t;

            const storageKeyBest = 'neon_drift_best_v9';
            const storageKeySelected = 'neon_drift_selected_skin_v9';

            let best = Number(localStorage.getItem(storageKeyBest) || 0);
            if (!Number.isFinite(best)) best = 0;
            best = Math.max(0, Math.floor(best));
            localStorage.setItem(storageKeyBest, String(best));
            bestEl.textContent = String(best);

            const unlocks = [
                { score: 0, name: 'Starter', bodyHue: 190, accentHue: 310, trail: false },

                { score: 400, name: 'Cyan Pulse', bodyHue: 185, accentHue: 200, trail: true },
                { score: 800, name: 'Violet Spark', bodyHue: 275, accentHue: 315, trail: true },
                { score: 1200, name: 'Solar Lime', bodyHue: 95, accentHue: 185, trail: true },
                { score: 1700, name: 'Crimson Nova', bodyHue: 350, accentHue: 30, trail: true },

                { score: 2300, name: 'Gold Mythic', bodyHue: 45, accentHue: 185, trail: true },
                { score: 3000, name: 'Arctic Halo', bodyHue: 205, accentHue: 160, trail: true },
                { score: 3800, name: 'Ember Orbit', bodyHue: 18, accentHue: 55, trail: true },

                { score: 4700, name: 'Void Prism', bodyHue: 260, accentHue: 320, trail: true },
                { score: 6000, name: 'Aurora Rift', bodyHue: 145, accentHue: 285, trail: true }
            ];

            function unlockedMaxIndexFromBest(b) {
                let idx = 0;
                for (let i = unlocks.length - 1; i >= 0; i--) {
                    if (b >= unlocks[i].score) { idx = i; break; }
                }
                return idx;
            }

            let unlockedMax = unlockedMaxIndexFromBest(best);

            let selectedSkinIndex = Number(localStorage.getItem(storageKeySelected) || 0);
            if (!Number.isFinite(selectedSkinIndex)) selectedSkinIndex = 0;
            selectedSkinIndex = clamp(Math.floor(selectedSkinIndex), 0, unlocks.length - 1);
            if (selectedSkinIndex > unlockedMax) selectedSkinIndex = unlockedMax;
            localStorage.setItem(storageKeySelected, String(selectedSkinIndex));

            function currentSkin() {
                return unlocks[selectedSkinIndex] || unlocks[0];
            }

            function setSkinPillVisuals() {
                const s = currentSkin();
                skinNameEl.textContent = s.name;

                const dotColor = `hsl(${s.bodyHue} 95% 65%)`;
                const borderColor = `hsla(${s.bodyHue}, 95%, 70%, 0.35)`;
                skinDotEl.style.background = `radial-gradient(circle at 30% 30%, #fff, ${dotColor})`;
                skinDotEl.style.boxShadow = `0 0 18px hsla(${s.bodyHue}, 95%, 65%, 0.55)`;
                skinPillEl.style.borderColor = borderColor;
            }

            function nextUnlockText() {
                const next = unlocks[unlockedMax + 1];
                if (!next) return 'None';
                return next.score + ' pts';
            }

            function renderCosmeticsGrid() {
                cosmeticsGrid.innerHTML = '';
                for (let i = 0; i < unlocks.length; i++) {
                    const s = unlocks[i];
                    const unlocked = (best >= s.score);
                    const selected = (i === selectedSkinIndex);

                    const item = document.createElement('div');
                    item.className = 'cosmeticItem' + (selected ? ' selected' : '');
                    item.setAttribute('role', 'button');
                    item.tabIndex = 0;

                    const sw = document.createElement('div');
                    sw.className = 'cosmeticSwatch';
                    sw.style.background = `linear-gradient(90deg, hsla(${s.bodyHue}, 95%, 65%, 0.38), hsla(${s.accentHue}, 95%, 65%, 0.30))`;
                    sw.style.borderColor = `hsla(${s.bodyHue}, 95%, 70%, 0.20)`;

            function sanitizeNameClient(input) {
                let cleaned = String(input || "").trim().replace(/[^a-zA-Z0-9 _]/g, "");
                cleaned = cleaned.replace(/\s+/g, " ").trim();
                if (cleaned.length > 16) cleaned = cleaned.slice(0, 16);
                return cleaned;
            }

            function containsBannedClient(name) {
                const n = name.toLowerCase();
                const banned = [
                    "fuck", "shit", "bitch", "cunt", "asshole",
                    "nigger", "fag",
                    "hitler", "nazi",
                    "rape", "porn"
                ];
                return banned.some(w => n.includes(w));
            }

            function renderLeaderboard(items) {

            async function fetchTop10() {
                lbMsgEl.textContent = "Loading";
                try {
                    const res = await fetch(LEADERBOARD_BASE + "/top", { method: "GET" });
                    const ct = res.headers.get("content-type") || "";
                    const data = ct.includes("application/json") ? await res.json() : await res.text();

                    if (!res.ok) {
                        const msg = (data && (data.detail || data.error)) ? String(data.detail || data.error) : `Could not load (${res.status})`;
                        lbMsgEl.textContent = msg;
                        renderLeaderboard([]);
                        return;
                    }

                    renderLeaderboard(data);
                    lbMsgEl.textContent = "";
                } catch {
                    lbMsgEl.textContent = "Could not load (network)";
                    renderLeaderboard([]);
                }
            }

            async function submitScore(name, score, token) {
                lbMsgEl.textContent = "Submitting";
                try {
                    const res = await fetch(LEADERBOARD_BASE + "/submit", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, score, token })
                    });

                    const ct = res.headers.get("content-type") || "";
                    const data = ct.includes("application/json") ? await res.json() : await res.text();

                    if (!res.ok) {
                        const msg = (data && (data.detail || data.error)) ? String(data.detail || data.error) : `Submit failed (${res.status})`;
                        lbMsgEl.textContent = msg;
                        return false;
                    }

                    lbMsgEl.textContent = "Submitted";
                    renderLeaderboard(data.top);
                    return true;
                } catch {
                    lbMsgEl.textContent = "Submit failed (network)";
                    return false;
                }

            function addFloatText(x, y, text, hue) {
                state.floatTexts.push({ x, y, text, hue, life: 0.9, ttl: 0.9 });

            function drawFloatTexts(dt) {
                if (state.floatTexts.length === 0) return;

                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '900 14px system-ui, -apple-system, Segoe UI, Roboto, Arial';

                for (let i = state.floatTexts.length - 1; i >= 0; i--) {
                    const ft = state.floatTexts[i];

                    ft.life -= dt;
                    ft.y -= 26 * dt;

                    if (ft.life <= 0) {
                        state.floatTexts.splice(i, 1);
                        continue;
                    }

                    const a = Math.max(0, ft.life / ft.ttl);

                    ctx.globalAlpha = a;
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = `hsla(${ft.hue}, 95%, 65%, ${0.55 * a})`;
                    ctx.fillStyle = `hsla(${ft.hue}, 95%, 70%, ${0.95 * a})`;
                    ctx.fillText(ft.text, ft.x, ft.y);
                }

                ctx.restore();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            function spawnAsteroid(extraSpeedMul = 1) {
                const edge = Math.floor(Math.random() * 4);
                let x, y, vx, vy;

                // Tie asteroid speed to the same level curve as the ship
                const lvl01 = (state.level.lvl - 1) / (20 - 1);          // 0 to 1
                const ease = Math.min(1, Math.max(0, lvl01));
                const eased = ease * ease;

                const startMin = 40;
                const startMax = 85;

                // At max level, add this much speed
                const maxBonus = 180;

                const baseSpeed = rand(startMin, startMax);
                const timeBonus = Math.min(70, state.t * 0.6);
                const speed = (baseSpeed + timeBonus + eased * maxBonus) * extraSpeedMul;

                const angleToCenter = (x0, y0) => Math.atan2(H * 0.5 - y0, W * 0.5 - x0);

                if (state.t > 2.0) {
                    state.lastSpawn += dt;
                    if (state.lastSpawn >= spawnInterval) {
                        state.lastSpawn = 0;
                        spawnAsteroid(state.storm.active ? 1.10 : 1);
                    }
                }

                if (edge === 0) { x = rand(0, W); y = -30; }
                if (edge === 1) { x = W + 30; y = rand(0, H); }
                if (edge === 2) { x = rand(0, W); y = H + 30; }
                if (edge === 3) { x = -30; y = rand(0, H); }

                const ang = angleToCenter(x, y) + rand(-0.55, 0.55);
                vx = Math.cos(ang) * speed;
                vy = Math.sin(ang) * speed;

                const r = rand(16, 42);
                const spin = rand(-2.2, 2.2);

                const jag = [];
                const verts = Math.floor(rand(7, 12));
                for (let i = 0; i < verts; i++) jag.push(rand(0.75, 1.25));

                state.asteroids.push({ x, y, vx, vy, r, a: rand(0, Math.PI * 2), spin, jag, nearMissed: false });
            }

            function burst(x, y, base, spread, count, life, spdMin, spdMax, hueOverride = null) {
                for (let i = 0; i < count; i++) {
                    const a = base + rand(-spread, spread);
                    const sp = rand(spdMin, spdMax);
                    state.particles.push({
                        x, y,
                        vx: Math.cos(a) * sp,
                        vy: Math.sin(a) * sp,
                        r: rand(1.2, 2.8),
                        life,
                        ttl: life,
                        hue: hueOverride !== null ? hueOverride : (Math.random() < 0.5 ? 185 : 310)
                    });
                }
            }

            function tryDash(keys) {
                if (state.dash.timer > 0) return;

                state.dash.timer = state.dash.cd;
                state.dash.active = true;
                state.dash.activeTimer = state.dash.activeDur;

                const p = state.player;

                let ax = 0, ay = 0;
                const up = keys.has('ArrowUp') || keys.has('w') || keys.has('W');
                const down = keys.has('ArrowDown') || keys.has('s') || keys.has('S');
                const left = keys.has('ArrowLeft') || keys.has('a') || keys.has('A');
                const right = keys.has('ArrowRight') || keys.has('d') || keys.has('D');

                if (up) ay -= 1;
                if (down) ay += 1;
                if (left) ax -= 1;
                if (right) ax += 1;

                if (state.pointer.active) {
                    const dx = state.pointer.x - p.x;
                    const dy = state.pointer.y - p.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist > 2) { ax += dx / dist; ay += dy / dist; }
                }

                const mag = Math.hypot(ax, ay);
                if (mag > 0) { ax /= mag; ay /= mag; } else { ax = 0; ay = -1; }

                const dashSpeed = 1250;
                p.vx += ax * dashSpeed;
                p.vy += ay * dashSpeed;

                state.shake = 6;

                const s = currentSkin();
                burst(p.x, p.y, Math.atan2(ay, ax) + Math.PI, 1.7, 60, 0.55, 120, 560, s.accentHue);
                addFloatText(p.x, p.y - 22, 'DASH', s.accentHue);
            }

            function dashHitAsteroid(a, dx, dy) {
                const dist = Math.hypot(dx, dy) || 1;

                // Push asteroid away from the player
                const nx = dx / dist;
                const ny = dy / dist;

                const knock = 780; // raise for stronger knockback
                a.vx += nx * knock;
                a.vy += ny * knock;

                // Add a bit of spin for fun
                a.spin += rand(-3.5, 3.5);

                // Prevent repeated hits in the same frame cluster
                a.x += nx * 10;
                a.y += ny * 10;

                const s = currentSkin();
                burst(a.x, a.y, Math.atan2(ny, nx), 1.2, 24, 0.45, 80, 420, s.accentHue);

                // Optional: reward
                state.score += 6 + state.combo.mult * 2;
            }

            function drawAsteroid(a) {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.a);

                ctx.beginPath();
                const n = a.jag.length;
                for (let i = 0; i < n; i++) {
                    const tt = (i / n) * Math.PI * 2;
                    const rr = a.r * a.jag[i];
                    const px = Math.cos(tt) * rr;
                    const py = Math.sin(tt) * rr;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(-a.r * 0.2, -a.r * 0.2, a.r * 0.2, 0, 0, a.r * 1.25);
                grad.addColorStop(0, 'rgba(255,255,255,0.18)');
                grad.addColorStop(0.35, 'rgba(86,242,255,0.10)');
                grad.addColorStop(1, 'rgba(255,255,255,0.03)');

                ctx.fillStyle = grad;
                ctx.fill();

                ctx.lineWidth = 1.25;
                ctx.strokeStyle = 'rgba(86,242,255,0.18)';
                ctx.stroke();

                ctx.restore();
            }

            function trailTuningForSkin(s) {
                // Higher tier skins get a longer, brighter trail
                // You can tune these numbers freely
                let life = 0.35;
                let width = 10;
                let alpha = 0.55;

                // Give specific tiers extra punch
                if (s.name === 'Gold Mythic') { life = 0.55; width = 13; alpha = 0.70; }
                if (s.name === 'Void Prism') { life = 0.60; width = 14; alpha = 0.75; }
                if (s.name === 'Aurora Rift') { life = 0.62; width = 15; alpha = 0.78; }

                return { life, width, alpha };
            }

            function pushPlayerTrail(dt) {
                const s = currentSkin();
                if (!s.trail) return;

                const p = state.player;
                const speed = Math.hypot(p.vx, p.vy);

                // If not moving much, do not spam trail points
                if (speed < 35) return;

                // Spacing control, smaller means denser trail
                const spacing = 6;

                p.trailAcc += speed * dt;
                if (p.trailAcc < spacing) return;
                p.trailAcc = 0;

                p.trailPts.push({
                    x: p.x,
                    y: p.y,
                    t: state.t
                });

                // Trim old points
                const tune = trailTuningForSkin(s);
                const cutoff = state.t - tune.life;
                while (p.trailPts.length && p.trailPts[0].t < cutoff) p.trailPts.shift();

                // Hard cap so it never grows
                if (p.trailPts.length > 70) p.trailPts.splice(0, p.trailPts.length - 70);
            }

            function drawPlayerTrail() {
                const s = currentSkin();
                if (!s.trail) return;

                const p = state.player;
                const pts = p.trailPts;
                if (pts.length < 2) return;

                const tune = trailTuningForSkin(s);
                const life = tune.life;
                const baseW = tune.width;
                const baseA = tune.alpha;

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 1; i < pts.length; i++) {
                    const a0 = pts[i - 1];
                    const a1 = pts[i];

                    const age = state.t - a1.t;
                    const k = 1 - clamp(age / life, 0, 1); // 1 fresh, 0 old

                    const w = baseW * (0.25 + 0.75 * k);
                    const alpha = baseA * (k * k);

                    // Blend between accent and body along the trail
                    const hue = lerp(s.accentHue, s.bodyHue, i / (pts.length - 1));

                    ctx.strokeStyle = `hsla(${hue}, 95%, 65%, ${alpha})`;
                    ctx.lineWidth = w;

                    ctx.beginPath();
                    ctx.moveTo(a0.x, a0.y);
                    ctx.lineTo(a1.x, a1.y);
                    ctx.stroke();
                }

                // Optional: a soft glow wash to make it feel neon
                const last = pts[pts.length - 1];
                ctx.globalAlpha = 0.35;
                ctx.fillStyle = `hsla(${s.accentHue}, 95%, 60%, 0.18)`;
                ctx.beginPath();
                ctx.arc(last.x, last.y, 22, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
            }

            function drawPlayer(p) {
                const s = currentSkin();

                ctx.save();
                ctx.translate(p.x, p.y);

                const ang = Math.atan2(p.vy, p.vx);
                const hasVel = (p.vx * p.vx + p.vy * p.vy) > 20;
                ctx.rotate(hasVel ? ang : -Math.PI / 2);

                const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, 28);
                glow.addColorStop(0, `hsla(${s.bodyHue}, 95%, 65%, 0.60)`);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(0, 0, 28, 0, Math.PI * 2);
                ctx.fill();

                if (s.trail) {
                    const tailAng = (hasVel ? ang : -Math.PI / 2) + Math.PI;
                    const tx = Math.cos(tailAng) * 12;
                    const ty = Math.sin(tailAng) * 12;
                    const trail = ctx.createRadialGradient(tx, ty, 0, tx, ty, 24);
                    trail.addColorStop(0, `hsla(${s.accentHue}, 95%, 65%, 0.34)`);
                    trail.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = trail;
                    ctx.beginPath();
                    ctx.arc(tx, ty, 24, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.moveTo(18, 0);
                ctx.lineTo(-14, -10);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-14, 10);
                ctx.closePath();

                const body = ctx.createLinearGradient(-14, -10, 18, 10);
                body.addColorStop(0, `hsla(${s.accentHue}, 95%, 60%, 0.20)`);
                body.addColorStop(0.55, `hsla(${s.bodyHue}, 95%, 65%, 0.26)`);
                body.addColorStop(1, 'rgba(255,255,255,0.06)');

                ctx.fillStyle = body;
                ctx.fill();

                ctx.lineWidth = 1.2;
                ctx.strokeStyle = `hsla(${s.bodyHue}, 95%, 70%, 0.45)`;
                ctx.stroke();

                ctx.globalAlpha = 0.9;
                ctx.beginPath();
                ctx.arc(-6, 0, 2.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.fill();

                ctx.restore();
            }

            function drawStars(dt) {
                for (const s of state.stars) {
                    s.tw += dt * (0.8 + s.z);
                    s.y += dt * (20 + 80 * s.z);
                    if (s.y > H + 10) { s.y = -10; s.x = Math.random() * W; }
                    const a = 0.20 + 0.20 * Math.sin(s.tw);
                    ctx.globalAlpha = a;
                    ctx.fillStyle = 'rgba(219,232,255,1)';
                    ctx.fillRect(s.x, s.y, 1 + s.z, 1 + s.z);
                }
                ctx.globalAlpha = 1;
            }

            function endGame() {
                running = false;

                if (finalScore > best) {

                    localStorage.setItem(storageKeyBest, String(best));
                    bestEl.textContent = String(best);

                    const prevUnlocked = unlockedMax;
                    unlockedMax = unlockedMaxIndexFromBest(best);

                        const newSkin = unlocks[unlockedMax];
                        addFloatText(W * 0.5, H * 0.22, 'UNLOCKED ' + newSkin.name, newSkin.bodyHue);

            });

            lbSubmitBtn.addEventListener("click", async () => {
                if (isRunScoreAlreadySubmitted(currentRunScore)) {
                    lbSubmitBtn.disabled = true;
                    lbMsgEl.textContent = "This run score was already submitted";
                    return;
                }

                const name = sanitizeNameClient(lbNameEl.value);
                lbNameEl.value = name;

                if (name.length < 2) { lbMsgEl.textContent = "Name must be at least 2 characters"; return; }
                if (containsBannedClient(name)) { lbMsgEl.textContent = "Name contains banned words"; return; }

                const tokenEl = document.querySelector('input[name="cf-turnstile-response"]');
                const token = tokenEl ? tokenEl.value : "";
                if (!token) { lbMsgEl.textContent = "Complete the verification first"; return; }

                localStorage.setItem(LB_NAME_KEY, name);

                const ok = await submitScore(name, currentRunScore, token);
                if (ok) {
                    markRunScoreSubmitted(currentRunScore);
                    lbSubmitBtn.disabled = true;
                    lbMsgEl.textContent = "Submitted";
                }
            });

            const keys = new Set();

            function isTypingInField() {
                const ae = document.activeElement;
                if (!ae) return false;
                const tag = ae.tagName;
                return tag === 'INPUT' || tag === 'TEXTAREA' || ae.isContentEditable === true;
            }

            addEventListener('keydown', (e) => {
                if (isTypingInField()) {
                    if (document.activeElement === lbNameEl && e.key === 'Enter') {
                        e.preventDefault();
                        lbSubmitBtn.click();
                    }
                    return;
                }
                keys.add(e.key);
                if (e.key === ' ' && running) tryDash(keys);
                if (e.key === ' ' && gameOver && restartCooldown <= 0) start();
                if (e.key === 'Enter' && !running && restartCooldown <= 0) start();
            });

            addEventListener('keyup', (e) => {
                if (isTypingInField()) return;
                keys.delete(e.key);
            });

            function pointerPos(e) {
                const t = (e.touches && e.touches[0]) ? e.touches[0] : e;
                return { x: t.clientX, y: t.clientY };
            }

            let lastTapTime = 0;
            canvas.addEventListener('pointerdown', (e) => {
                canvas.setPointerCapture(e.pointerId);
                state.pointer.active = true;
                const p = pointerPos(e);
                state.pointer.x = p.x;
                state.pointer.y = p.y;

                const now = performance.now();
                if (now - lastTapTime < 320 && running) tryDash(keys);
                lastTapTime = now;

                if (!running && restartCooldown <= 0) start();
            }, { passive: true });

            canvas.addEventListener('pointermove', (e) => {
                if (!state.pointer.active) return;
                const p = pointerPos(e);
                state.pointer.x = p.x;
                state.pointer.y = p.y;
            }, { passive: true });

            canvas.addEventListener('pointerup', () => state.pointer.active = false, { passive: true });
            canvas.addEventListener('pointercancel', () => state.pointer.active = false, { passive: true });

            function start() {
                if (restartCooldown > 0) return;
                reset();
                running = true;
                gameOver = false;
                restartCooldown = 0;
                setOverlay('hide');
            }

            playBtn.addEventListener('click', () => start());

            shareBtn.addEventListener('click', async () => {
                const url = location.href;
                const txt = `Play Neon Drift: ${url}`;
                try {
                    await navigator.clipboard.writeText(txt);
                    shareBtn.textContent = 'Copied';
                    setTimeout(() => shareBtn.textContent = 'Copy Share Text', 900);
                } catch {
                    prompt('Copy this text:', txt);
                }
            });

            function updateDashBar() {
                const dashPct = 1 - (state.dash.timer / state.dash.cd);
                dashBarEl.style.width = (dashPct * 100).toFixed(1) + '%';
            }

            function drawStormOverlay() {
                if (!state.storm.active) return;

                const flicker = 0.10 + 0.08 * Math.sin(state.t * 18) + 0.06 * Math.random();
                ctx.save();
                ctx.globalAlpha = Math.max(0.06, Math.min(0.22, flicker));
                ctx.fillStyle = 'rgba(255, 60, 90, 1)';
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            function step() {
                const dt = 0.016;

                const bg = ctx.createLinearGradient(0, 0, 0, H);
                bg.addColorStop(0, '#070911');
                bg.addColorStop(1, '#050716');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, W, H);

                if (restartCooldown > 0) {
                    restartCooldown = Math.max(0, restartCooldown - dt);
                }

                if (gameOver) {
                    if (restartCooldown > 0) {
                        const secs = Math.ceil(restartCooldown);
                        smallTip.innerHTML = 'Restart available in ' + secs + 's';
                        playBtn.disabled = true;
                    } else {
                        smallTip.innerHTML = 'Press <span class="kbd">Space</span> to play again.';
                        playBtn.disabled = false;
                    }
                }

                //drawStars(dt);

                if (running) {
                    state.t += dt;

                    if (state.storm.active) {
                        state.storm.timer -= dt;
                        if (state.storm.timer <= 0) {
                            state.storm.active = false;
                            updateStormUI();
                        }
                    } else {
                        if (state.t >= state.storm.nextAt) {
                            state.storm.active = true;
                            state.storm.timer = 5;
                            state.storm.nextAt += 20;
                            updateStormUI();
                            addFloatText(W * 0.5, 90, 'ASTEROID STORM', 0);
                        }
                    }

                    if (state.dash.timer > 0) state.dash.timer = Math.max(0, state.dash.timer - dt);
                    if (state.dash.activeTimer > 0) {
                        state.dash.activeTimer = Math.max(0, state.dash.activeTimer - dt);
                        if (state.dash.activeTimer === 0) state.dash.active = false;
                    }
                    updateDashBar();

                    // Combo decay
                    if (state.combo.timer > 0) {
                        state.combo.timer = Math.max(0, state.combo.timer - dt);
                        if (state.combo.timer === 0) {
                            state.combo.mult = 1;
                        }
                    }
                    comboEl.textContent = 'x' + String(state.combo.mult);

                    // Spawn rate starts slower, then ramps up over time
                    const tSpawn = state.t;

                    const startInterval = 1.6;   // bigger number = fewer asteroids early
                    const endInterval = 0.40;     // smaller number = more asteroids late
                    const rampSeconds = 130;       // how long the ramp takes

                    const ramp01 = Math.min(1, tSpawn / rampSeconds);
                    const ease = ramp01 * ramp01; // gentle early ramp

                    let baseInterval = lerp(startInterval, endInterval, ease);

                    // Storm makes spawns denser but not ridiculous
                    const stormMul = state.storm.active ? 0.75 : 1;
                    const spawnInterval = baseInterval * stormMul;

                    state.lastSpawn += dt;
                    if (state.lastSpawn >= spawnInterval) {
                        state.lastSpawn = 0;
                        spawnAsteroid(state.storm.active ? 1.10 : 1);
                    }

                    const p = state.player;

                    const levelEverySeconds = 12;
                    const maxLevel = 20;

                    const lvl = Math.min(maxLevel, 1 + Math.floor(state.t / levelEverySeconds));
                    if (lvl !== state.level.lvl) {
                        state.level.lvl = lvl;
                        levelTextEl.textContent = 'Lvl ' + lvl;
                    }

                    const speedMul = 0.70 + (lvl - 1) * 0.06;

                    const accel = 680 * speedMul;
                    const maxSpd = 420 * speedMul;

                    let ax = 0, ay = 0;
                    const up = keys.has('ArrowUp') || keys.has('w') || keys.has('W');
                    const down = keys.has('ArrowDown') || keys.has('s') || keys.has('S');
                    const left = keys.has('ArrowLeft') || keys.has('a') || keys.has('A');
                    const right = keys.has('ArrowRight') || keys.has('d') || keys.has('D');

                    if (up) ay -= 1;
                    if (down) ay += 1;
                    if (left) ax -= 1;
                    if (right) ax += 1;

                    if (state.pointer.active) {
                        const dx = state.pointer.x - p.x;
                        const dy = state.pointer.y - p.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist > 2) { ax += dx / dist; ay += dy / dist; }
                    }

                    const mag = Math.hypot(ax, ay);
                    if (mag > 0) { ax /= mag; ay /= mag; }

                    p.vx += ax * accel * dt;
                    p.vy += ay * accel * dt;

                    const damp = 0.86;
                    p.vx *= Math.pow(damp, dt * 60);
                    p.vy *= Math.pow(damp, dt * 60);

                    const spdNow = Math.hypot(p.vx, p.vy);

                    // While dashing, allow a higher cap so it feels powerful
                    const cap = state.dash.active ? (maxSpd * 2.4) : maxSpd;

                    if (spdNow > cap) {
                        const k = cap / spdNow;
                        p.vx *= k;
                        p.vy *= k;
                    }

                    p.x += p.vx * dt;
                    p.y += p.vy * dt;

                    const pad = 24;
                    if (p.x < pad) { p.x = pad; p.vx *= -0.25; }
                    if (p.x > W - pad) { p.x = W - pad; p.vx *= -0.25; }
                    if (p.y < pad) { p.y = pad; p.vy *= -0.25; }
                    if (p.y > H - pad) { p.y = H - pad; p.vy *= -0.25; }

                    pushPlayerTrail(dt);

                    for (const a of state.asteroids) {
                        a.x += a.vx * dt;
                        a.y += a.vy * dt;
                        a.a += a.spin * dt;

                        const dx = p.x - a.x;
                        const dy = p.y - a.y;
                        const d2 = dx * dx + dy * dy;

                        const rColl = (p.r * 0.9) + (a.r * 0.82);
                        const rColl2 = rColl * rColl;

                        // Near miss band just outside collision
                        const rNear = rColl + 18;
                        const rNear2 = rNear * rNear;

                        // Near miss
                        if (!a.nearMissed && d2 <= rNear2 && d2 > rColl2) {
                            a.nearMissed = true;

                            state.combo.nearCount += 1;
                            state.combo.mult = Math.min(8, state.combo.mult + 1);
                            state.combo.max = Math.max(state.combo.max, state.combo.mult);
                            state.combo.timer = 1.6;

                            // points
                            state.score += 50;

                            addFloatText(a.x, a.y - a.r - 10, '+50 NEAR MISS x' + state.combo.mult, currentSkin().accentHue);
                        }

                        // Collision
                        if (d2 <= rColl2) {
                            if (!state.dash.active) {
                                endGame();
                                break;
                            } else {
                                // Dash hit handled below
                                dashHitAsteroid(a, dx, dy);
                            }
                        }
                    }

                    state.score += dt * 4.0;
                    scoreEl.textContent = String(Math.floor(state.score));
                }

                drawStars(dt);
                drawStormOverlay();

                for (const a of state.asteroids) drawAsteroid(a);
                drawPlayerTrail();
                drawPlayer(state.player);

                // draw popups last, on top
                drawFloatTexts(dt);

                requestAnimationFrame(step);
            }

            setSkinPillVisuals();
            setOverlay('start');
            requestAnimationFrame(step);

            fetchTop10().catch(() => { });
        })();
    </script>
</body>
